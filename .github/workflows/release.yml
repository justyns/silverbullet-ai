name: Release

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Create dist files
        run: npm run dist

      - name: Determine tag name
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "name=v${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Update changelog
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date +%Y-%m-%d)

          # Find the previous tag (skip the current one if it already exists)
          PREV_TAG=$(git tag --sort=-version:refname | grep "^v" | grep -v "^v${VERSION}$" | head -1 || true)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges \
              | grep -vE "^- (Bump version|Revert|Update changelog|Merge)" || true)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges \
              | grep -vE "^- (Bump version|Revert|Update changelog|Merge)" || true)
          fi

          if [ -z "$COMMITS" ]; then
            echo "No commits found for changelog entry, skipping"
            exit 0
          fi

          export VERSION DATE COMMITS
          node << 'EOF'
            const fs = require('fs');
            const { VERSION, DATE, COMMITS } = process.env;
            const entry = `## ${VERSION} (${DATE})\n\n${COMMITS}\n\n`;
            const content = fs.readFileSync('docs/Changelog.md', 'utf8');
            const idx = content.indexOf('\n## ');
            const updated = idx === -1
              ? content + entry
              : content.slice(0, idx + 1) + entry + content.slice(idx + 1);
            fs.writeFileSync('docs/Changelog.md', updated);
            console.log(`Changelog updated for v${VERSION}`);
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/Changelog.md
          git diff --cached --quiet || git commit -m "Update changelog for v${VERSION}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/silverbullet-ai.plug.js
            dist/PLUG.md
            dist/silverbullet-ai-library.md
