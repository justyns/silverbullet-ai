<link rel="stylesheet" href="/.client/main.css" />
<style>
  :root {
    --status-success-color: #22c55e;
    --status-success-bg: rgba(34, 197, 94, 0.1);
    --status-warning-color: #f59e0b;
    --status-warning-bg: rgba(245, 158, 11, 0.1);
    --status-danger-color: #ef4444;
    --status-danger-bg: rgba(239, 68, 68, 0.1);
    --status-reasoning-color: #8b5cf6;
    --status-reasoning-bg: rgba(139, 92, 246, 0.1);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: var(--ui-font, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif);
    font-size: 14px;
    background: var(--root-background-color);
    color: var(--root-color);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .ai-chat-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .ai-chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid var(--modal-border-color);
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .ai-chat-header h3 {
    font-size: 14px;
    font-weight: 600;
    cursor: pointer !important;
  }

  .ai-chat-header h3.has-agent {
    color: var(--ui-accent-color);
  }

  .clear-agent-btn {
    background: none;
    border: none;
    color: var(--subtle-color);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
    opacity: 0.7;
  }

  .clear-agent-btn:hover {
    opacity: 1;
    color: var(--root-color);
  }

  .clear-agent-btn.hidden {
    display: none;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 0;
    justify-content: flex-end;
    margin: 0 8px;
  }

  .model-display {
    font-size: 11px;
    color: var(--root-color);
    padding: 2px 8px;
    background: var(--subtle-background-color);
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
  }

  .ai-chat-actions {
    display: flex;
    gap: 4px;
  }

  .ai-chat-actions button {
    background: var(--button-background-color);
    border: 1px solid var(--button-border-color);
    color: var(--button-color);
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }

  .ai-chat-actions button:hover {
    opacity: 0.8;
  }

  .ai-chat-actions button.close-btn {
    border: none;
    font-size: 16px;
    padding: 4px 6px;
  }

  /* Overflow menu container */
  .overflow-menu-container {
    position: relative;
    display: none;
  }

  .overflow-btn {
    font-size: 16px;
    padding: 4px 8px;
    line-height: 1;
  }

  .overflow-menu {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: var(--root-background-color);
    border: 1px solid var(--modal-border-color);
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    z-index: 100;
    min-width: 150px;
  }

  .overflow-menu.hidden {
    display: none;
  }

  .overflow-menu-item {
    display: block;
    width: 100%;
    padding: 8px 12px;
    text-align: left;
    background: none;
    border: none;
    color: var(--root-color);
    cursor: pointer;
    font-size: 13px;
  }

  .overflow-menu-item:hover {
    background: var(--subtle-background-color);
  }

  .overflow-menu-item.overflow-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .overflow-menu-item.overflow-toggle.enabled {
    color: var(--status-success-color);
  }

  #overflow-reasoning-btn.enabled {
    color: var(--status-reasoning-color);
  }

  .overflow-menu-item.overflow-toggle.enabled .toggle-icon::after {
    content: " ✓";
  }

  .overflow-divider {
    height: 1px;
    background: var(--modal-border-color);
    margin: 4px 0;
  }

  .overflow-menu-info {
    padding: 8px 12px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    color: var(--subtle-color);
  }

  .overflow-menu-info #overflow-model-name {
    font-weight: 500;
    color: var(--root-color);
  }

  .overflow-menu-info .overflow-tokens {
    font-size: 11px;
  }

  .token-display {
    font-size: 11px;
    color: var(--subtle-color);
    padding: 2px 8px;
    background: var(--subtle-background-color);
    border-radius: 4px;
    cursor: help;
    white-space: nowrap;
  }

  .token-display.warning {
    color: var(--status-warning-color);
    background: var(--status-warning-bg);
  }

  .token-display.danger {
    color: var(--status-danger-color);
    background: var(--status-danger-bg);
  }

  .rag-indicator {
    font-size: 11px;
    color: var(--subtle-color);
    padding: 2px 8px;
    background: var(--subtle-background-color);
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .rag-indicator.enabled {
    color: var(--status-success-color);
    background: var(--status-success-bg);
  }

  .rag-indicator.disabled {
    color: var(--subtle-color);
    opacity: 0.6;
  }

  .rag-indicator.searching {
    color: var(--status-success-color);
    animation: rag-pulse 1.5s ease-in-out infinite;
  }

  @keyframes rag-pulse {
    0%, 100% {
      opacity: 1;
    }
    50% {
      opacity: 0.5;
    }
  }

  /* RAG context - uses tool-call base styling */
  .tool-call.rag-context .rag-icon {
    margin-right: 4px;
  }

  .tool-call.rag-context .context-details {
    padding: 8px 12px;
    max-height: 250px;
    overflow-y: auto;
  }

  .tool-call.rag-context .context-item {
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--modal-border-color);
  }

  .tool-call.rag-context .context-item:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }

  .tool-call.rag-context .context-item a {
    color: var(--ui-accent-color);
    text-decoration: none;
    font-weight: 500;
  }

  .tool-call.rag-context .context-item a:hover {
    text-decoration: underline;
  }

  .tool-call.rag-context .context-item .similarity {
    color: var(--status-success-color);
    font-size: 11px;
    margin-left: 8px;
    font-weight: 500;
  }

  .tool-call.rag-context .context-item blockquote {
    margin: 4px 0 0 0;
    padding: 4px 8px;
    border-left: 2px solid var(--modal-border-color);
    color: var(--subtle-color);
    font-size: 12px;
    background: var(--subtle-background-color);
    border-radius: 0 4px 4px 0;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .ai-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message {
    max-width: 90%;
    padding: 8px 12px;
    border-radius: 8px;
    line-height: 1.4;
    word-wrap: break-word;
  }

  .message.user {
    align-self: flex-end;
    background: var(--ui-accent-color);
    color: var(--ui-accent-contrast-color);
    border-bottom-right-radius: 2px;
    white-space: pre-wrap;
  }

  .message.assistant {
    align-self: flex-start;
    background: var(--subtle-background-color);
    border-bottom-left-radius: 2px;
  }

  .message.assistant.streaming {
    white-space: pre-wrap;
  }

  .message.streaming::after {
    content: "▊";
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%,
    50% {
      opacity: 1;
    }

    51%,
    100% {
      opacity: 0;
    }
  }

  /* Markdown rendering in assistant messages */
  .message.assistant p {
    margin: 0 0 8px 0;
  }

  .message.assistant p:last-child {
    margin-bottom: 0;
  }

  .message.assistant code {
    background: var(--subtle-background-color);
    padding: 2px 5px;
    border-radius: 3px;
    font-family: var(--editor-font);
    font-size: 0.9em;
  }

  .message.assistant pre {
    background: var(--subtle-background-color);
    padding: 10px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .message.assistant pre code {
    background: none;
    padding: 0;
  }

  .message.assistant ul,
  .message.assistant ol {
    margin: 8px 0;
    padding-left: 20px;
  }

  .message.assistant li {
    margin: 4px 0;
  }

  .message.assistant blockquote {
    border-left: 3px solid var(--subtle-color);
    margin: 8px 0;
    padding: 4px 12px;
    color: var(--subtle-color);
    background: var(--subtle-background-color);
    border-radius: 0 4px 4px 0;
    font-size: 0.9em;
  }

  .message.assistant a {
    color: var(--ui-accent-color);
    text-decoration: none;
  }

  .message.assistant a:hover {
    text-decoration: underline;
  }

  .message.assistant h1,
  .message.assistant h2,
  .message.assistant h3,
  .message.assistant h4 {
    margin: 12px 0 8px 0;
    font-weight: 600;
  }

  .message.assistant h1 {
    font-size: 1.3em;
  }

  .message.assistant h2 {
    font-size: 1.2em;
  }

  .message.assistant h3 {
    font-size: 1.1em;
  }

  .message.assistant h4 {
    font-size: 1em;
  }

  .message.assistant table {
    border-collapse: collapse;
    margin: 8px 0;
    width: 100%;
  }

  .message.assistant th,
  .message.assistant td {
    border: 1px solid var(--modal-border-color);
    padding: 6px 10px;
    text-align: left;
  }

  .message.assistant th {
    background: var(--subtle-background-color);
  }

  /* Input area */
  .ai-chat-input {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--modal-border-color);
  }

  .input-wrapper {
    position: relative;
    flex: 1;
  }

  .input-wrapper textarea {
    width: 100%;
  }

  .ai-chat-input textarea {
    background: var(--text-field-background-color);
    border: 1px solid var(--button-border-color);
    color: var(--root-color);
    padding: 8px;
    border-radius: 4px;
    resize: none;
    font-family: inherit;
    font-size: 14px;
    min-height: 40px;
    max-height: 120px;
  }

  .ai-chat-input textarea:focus {
    outline: none;
    border-color: var(--ui-accent-color);
  }

  .ai-chat-input button {
    background: var(--ui-accent-color);
    color: var(--ui-accent-contrast-color);
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }

  .ai-chat-input button:hover {
    opacity: 0.9;
  }

  .ai-chat-input button:disabled {
    background: var(--button-background-color);
    color: var(--subtle-color);
    cursor: not-allowed;
  }

  /* Autocomplete dropdown */
  .autocomplete-dropdown {
    position: absolute;
    bottom: 100%;
    left: 0;
    right: 0;
    max-height: 200px;
    overflow-y: auto;
    background: var(--root-background-color);
    border: 1px solid var(--modal-border-color);
    border-radius: 4px;
    box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.1);
    z-index: 100;
    margin-bottom: 4px;
  }

  .autocomplete-dropdown.hidden {
    display: none;
  }

  .autocomplete-item {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 14px;
    border-bottom: 1px solid var(--modal-border-color);
  }

  .autocomplete-item:last-child {
    border-bottom: none;
  }

  .autocomplete-item:hover,
  .autocomplete-item.selected {
    background: var(--ui-accent-color);
    color: var(--ui-accent-contrast-color);
  }

  .autocomplete-item .page-name {
    font-weight: 500;
  }

  .autocomplete-item .detail {
    font-size: 12px;
    color: var(--subtle-color);
    margin-left: 8px;
  }

  .autocomplete-item:hover .detail,
  .autocomplete-item.selected .detail {
    color: var(--ui-accent-contrast-color);
    opacity: 0.8;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--subtle-color);
    text-align: center;
    padding: 20px;
  }

  .empty-state h4 {
    margin-bottom: 8px;
  }

  /* Tool call expandable blocks */
  .tool-call {
    margin: 4px 0;
    border: 1px solid var(--modal-border-color);
    border-radius: 6px;
    font-size: 13px;
    background: var(--root-background-color);
  }

  .tool-call summary {
    padding: 8px 12px;
    cursor: pointer;
    background: var(--subtle-background-color);
    border-radius: 6px;
    list-style: none;
  }

  .tool-call summary::-webkit-details-marker {
    display: none;
  }

  .tool-call summary::before {
    content: "▶";
    display: inline-block;
    margin-right: 6px;
    font-size: 10px;
    transition: transform 0.2s;
  }

  .tool-call[open] summary::before {
    transform: rotate(90deg);
  }

  .tool-call[open] summary {
    border-bottom: 1px solid var(--modal-border-color);
    border-radius: 6px 6px 0 0;
  }

  .tool-call summary:hover {
    background: var(--subtle-background-color);
  }

  .tool-call .status {
    font-weight: bold;
  }

  .tool-call.success .status {
    color: var(--status-success-color);
  }

  .tool-call.error .status {
    color: var(--status-danger-color);
  }

  .tool-call .tool-details {
    padding: 8px 12px;
    background: var(--root-background-color);
    border-radius: 0 0 6px 6px;
  }

  .tool-call .tool-args,
  .tool-call .tool-result {
    margin-bottom: 8px;
  }

  .tool-call .tool-result:last-child {
    margin-bottom: 0;
  }

  .tool-call .tool-details pre {
    margin: 4px 0 0 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 12px;
    color: var(--root-color);
    background: var(--subtle-background-color);
    padding: 6px 8px;
    border-radius: 4px;
  }

  /* Reasoning block - similar to tool-call but with purple accent */
  .reasoning-block {
    margin: 4px 0;
    border: 1px solid var(--modal-border-color);
    border-left: 3px solid var(--status-reasoning-color);
    border-radius: 6px;
    font-size: 13px;
    background: var(--root-background-color);
  }

  .reasoning-block summary {
    padding: 8px 12px;
    cursor: pointer;
    background: var(--status-reasoning-bg);
    border-radius: 6px;
    list-style: none;
  }

  .reasoning-block summary::-webkit-details-marker {
    display: none;
  }

  .reasoning-block summary::before {
    content: "▶";
    display: inline-block;
    margin-right: 6px;
    font-size: 10px;
    transition: transform 0.2s;
  }

  .reasoning-block[open] summary::before {
    transform: rotate(90deg);
  }

  .reasoning-block[open] summary {
    border-bottom: 1px solid var(--modal-border-color);
    border-radius: 6px 6px 0 0;
  }

  .reasoning-block .reasoning-content {
    padding: 8px 12px;
    max-height: 300px;
    overflow-y: auto;
  }

  .reasoning-block .reasoning-content pre {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 12px;
    color: var(--subtle-color);
  }

  /* Reasoning indicator in header */
  .reasoning-indicator {
    font-size: 11px;
    color: var(--subtle-color);
    padding: 2px 8px;
    background: var(--subtle-background-color);
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .reasoning-indicator.enabled {
    color: var(--status-reasoning-color);
    background: var(--status-reasoning-bg);
  }

  .reasoning-indicator.disabled {
    color: var(--subtle-color);
    opacity: 0.6;
  }

  /* Mobile responsive styles */
  @media (max-width: 768px) {
    body {
      font-size: 13px;
    }

    .ai-chat-header {
      padding: 6px 8px;
    }

    .ai-chat-header h3 {
      font-size: 13px;
    }

    .ai-chat-actions {
      gap: 2px;
    }

    .ai-chat-actions button {
      padding: 3px 6px;
      font-size: 11px;
    }

    .ai-chat-messages {
      padding: 8px;
      gap: 8px;
    }

    .message {
      max-width: 95%;
      padding: 6px 10px;
      font-size: 13px;
    }

    .ai-chat-input {
      padding: 8px;
      gap: 6px;
    }

    .ai-chat-input textarea {
      padding: 6px;
      font-size: 13px;
      min-height: 36px;
      max-height: 100px;
    }

    .ai-chat-input button {
      padding: 6px 12px;
      font-size: 13px;
    }

    .header-status {
      gap: 4px;
      margin: 0 4px;
    }

    .model-display {
      max-width: 100px;
      font-size: 10px;
    }

    .tool-call {
      font-size: 12px;
    }

    .tool-call summary {
      padding: 6px 10px;
    }

    .tool-call .tool-details {
      padding: 6px 10px;
    }

    .autocomplete-dropdown {
      max-height: 150px;
    }

    .autocomplete-item {
      padding: 6px 10px;
      font-size: 13px;
    }
  }

  /* Extra small screens (phones in portrait) */
  @media (max-width: 480px) {
    body {
      font-size: 12px;
    }

    .ai-chat-header h3 {
      font-size: 12px;
    }

    .ai-chat-actions button {
      padding: 2px 4px;
      font-size: 10px;
    }

    /* Hide header status elements - all moved to overflow menu */
    .header-status {
      display: none;
    }

    /* Hide New and Export buttons, show overflow menu */
    .ai-chat-actions .new-btn,
    .ai-chat-actions .export-btn {
      display: none;
    }

    .overflow-menu-container {
      display: block;
    }

    .ai-chat-messages {
      padding: 6px;
      gap: 6px;
    }

    .message {
      padding: 5px 8px;
      font-size: 12px;
    }

    .ai-chat-input {
      padding: 6px;
      gap: 4px;
    }

    .ai-chat-input textarea {
      padding: 5px;
      font-size: 12px;
      min-height: 32px;
    }

    .ai-chat-input button {
      padding: 5px 10px;
      font-size: 12px;
    }
  }
</style>

<div class="ai-chat-panel">
  <div class="ai-chat-header">
    <div class="header-title">
      <h3 id="panel-title" title="Click to select agent">AI Assistant</h3>
      <button id="clear-agent-btn" class="clear-agent-btn hidden" title="Clear agent">✕</button>
    </div>
    <div class="header-status">
      <div id="model-display" class="model-display" title="Click to change model">
        <span id="model-name">--</span>
      </div>
      <div id="token-display" class="token-display" title="Tokens used / Context limit">
        <span id="token-count">0</span><span class="token-separator"> / </span><span id="context-limit">--</span>
      </div>
      <div id="rag-indicator" class="rag-indicator disabled" title="Embeddings search (RAG)">
        <span id="rag-icon">🔍</span>
        <span id="rag-status">RAG</span>
      </div>
      <div id="reasoning-indicator" class="reasoning-indicator disabled" title="Show model reasoning (click to toggle)">
        <span id="reasoning-icon">💭</span>
        <span id="reasoning-status">Think</span>
      </div>
    </div>
    <div class="ai-chat-actions">
      <button id="new-chat-btn" class="new-btn" title="Start new conversation">New</button>
      <button id="export-btn" class="export-btn" title="Export to markdown">Export</button>
      <div class="overflow-menu-container">
        <button id="overflow-btn" class="overflow-btn" title="More actions">⋮</button>
        <div id="overflow-menu" class="overflow-menu hidden">
          <div id="overflow-model-info" class="overflow-menu-info">
            <span id="overflow-model-name">--</span>
            <span class="overflow-tokens"><span id="overflow-token-count">0</span> / <span id="overflow-context-limit"
              >--</span></span>
          </div>
          <div class="overflow-divider"></div>
          <button id="overflow-new-chat-btn" class="overflow-menu-item">New chat</button>
          <button id="overflow-rag-btn" class="overflow-menu-item overflow-toggle">
            <span class="toggle-icon">🔍</span> <span id="overflow-rag-label">RAG</span>
          </button>
          <button id="overflow-reasoning-btn" class="overflow-menu-item overflow-toggle">
            <span class="toggle-icon">💭</span> <span id="overflow-reasoning-label">Reasoning</span>
          </button>
          <div class="overflow-divider"></div>
          <button id="overflow-export-btn" class="overflow-menu-item">Export to markdown</button>
        </div>
      </div>
      <button id="close-btn" class="close-btn" title="Close panel">×</button>
    </div>
  </div>
  <div class="ai-chat-messages" id="messages">
    <div class="empty-state" id="empty-state">
      <h4>Start a conversation</h4>
      <p>Ask anything about your notes or something.</p>
    </div>
  </div>
  <div class="ai-chat-input">
    <div class="input-wrapper">
      <textarea
        id="user-input"
        placeholder="Type a message... (@ or [[ for pages)"
        rows="1"
      ></textarea>
      <div id="autocomplete-dropdown" class="autocomplete-dropdown hidden"></div>
    </div>
    <button id="send-btn">Send</button>
  </div>
